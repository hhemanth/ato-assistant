[project]
name = "ato-agent"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.2.0",
    "anthropic>=0.40.0",
    "openai>=1.50.0",
    "pydantic>=2.9.0",
    "python-dotenv>=1.0.0",
    "langsmith>=0.2.0",
]

[tool.setuptools]
py-modules = ["graph", "judge_graph", "state"]

[tool.setuptools.packages.find]
where = ["."]
include = ["nodes*", "prompts*", "tools*"]

[tool.uv]
package = true

[tool.pytest.ini_options]
pythonpath = ["."]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
